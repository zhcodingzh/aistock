services:
  aistock:
    build:
      context: .
    ports:
      - "3100:3000"
    env_file:
      - .env
    restart: unless-stopped
    networks:
      - ssnetwork
    depends_on:
      mongodb:
        condition: service_healthy

  mongodb:
    image: mongo:7
    container_name: aistock-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: example
    volumes:
      - aistock-mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ssnetwork

volumes:
  aistock-mongo-data:

networks:
  ssnetwork:
    external: true
